<section class="privacy-policy-overlay ">
    <button (click)="close()">X</button>
    <h2>Privacy Policy</h2>

    @for (paragraph of privPolText; track paragraph; let i = $index) {
    <section class="priv-pol-text">
        <h3>{{ i + 1 }}. {{ paragraph.headline[currentLang] }}</h3>
        <p>{{ paragraph.text[currentLang] }}</p>
    </section>
    }

    

</section>
