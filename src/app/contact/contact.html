<div class="contact-header">
    <h2 class="section-anchor" id="contact">{{ sectionNames[currentLang][3] }}</h2>

    <a #arrowUpBtn class="arrow-up-btn" (click)="onScrollToTop($event)">
        <img src="assets/img/arrow_up.svg" alt="Arrow up" />
    </a>
</div>

<section class="section-content" >

    <p class="left-container">
        {{ contact.text[currentLang] }}
    </p>

    <p class="right-container">
        <span class=""><img src="../../assets/icons/icon _email.svg" alt="email"> {{ contact.email }} </span>
        <span class=""><img src="../../assets/icons/icon _phone.svg" alt="phone"> {{ contact.tel }} </span>
    </p>

</section>

<section class="section-content-resp">

    <p class="top-container">
        <span class=""><img src="../../assets/icons/icon _phone.svg" alt="phone"> {{ contact.tel }} </span>
        <span class=""><img src="../../assets/icons/icon _email.svg" alt="email"> {{ contact.email }} </span>
    </p>

    <p class="bottom-container">
        {{ contact.text[currentLang] }}
    </p>

</section>

<div class="contact-form">
    <app-contact-form (privacyPolicyRequested)="onPrivacyPolicyRequested()"></app-contact-form>
</div>
