<h2 id="aboutme" class="section-anchor">{{ sectionNames[currentLang][0] }}</h2>

<section class="section-content">

    <div class="left-container">
        <app-typewriter-02 [words]="typewriterWords"></app-typewriter-02>
    </div>
    <div class="right-container">
        <p class="ab-me-text" style="white-space: pre-line;">{{ aboutMe[currentLang] }}
        </p>

        <div class="button-container">
            <button class="contact-me-btn" (click)="onBounceScroll('contact', $event)">
                Let's talk
            </button>
        </div>
    </div>

</section>
